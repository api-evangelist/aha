              id:
                type: string
                example: '100098181'
              value:
                type: string
                example: P2
              color:
                type: integer
                example: 6710886
              hidden:
                type: boolean
                example: false
            example:
              id: '100098181'
              value: P2
              color: 6710886
              hidden: false
          example:
          - id: '100098181'
            value: P2
            color: 6710886
            hidden: false
          - id: '462681378'
            value: P5
            color: 6710886
            hidden: false
          - id: '486420793'
            value: P1
            color: 6710886
            hidden: false
          - id: '747947447'
            value: P4
            color: 6710886
            hidden: false
          - id: '854609942'
            value: P3
            color: 6710886
            hidden: false
      example:
        custom_field_options:
        - id: '100098181'
          value: P2
          color: 6710886
          hidden: false
        - id: '462681378'
          value: P5
          color: 6710886
          hidden: false
        - id: '486420793'
          value: P1
          color: 6710886
          hidden: false
        - id: '747947447'
          value: P4
          color: 6710886
          hidden: false
        - id: '854609942'
          value: P3
          color: 6710886
          hidden: false
    CustomfieldoptionsPostResponse:
      type: object
      properties:
        id:
          type: string
          example: '6776881149485179355'
        value:
          type: string
          example: New option
        color:
          type: integer
          example: 6710886
        hidden:
          type: boolean
          example: false
      example:
        id: '6776881149485179355'
        value: New option
        color: 6710886
        hidden: false
    CustomfieldoptionsPutResponse:
      type: object
      properties:
        id:
          type: string
          example: '486420793'
        value:
          type: string
          example: New option2
        color:
          type: integer
          example: 6710886
        hidden:
          type: boolean
          example: false
      example:
        id: '486420793'
        value: New option2
        color: 6710886
        hidden: false
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 authentication with bearer tokens
      flows:
        authorizationCode:
          authorizationUrl: https://{account-domain}.aha.io/oauth/authorize
          tokenUrl: https://{account-domain}.aha.io/oauth/token
          scopes: {}
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: API key authentication using Bearer token in Authorization header. Generate API keys at https://secure.aha.io/settings/api_keys
    CookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Cookie-based authentication for web browser integration
