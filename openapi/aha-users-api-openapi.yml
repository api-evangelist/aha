openapi: 3.1.0
info:
  title: Aha! Account backups Users API
  version: 1.0.0
  description: Complete API documentation for Aha! generated from actual test responses
  contact:
    name: Aha! Support
    url: https://www.aha.io/support
servers:
- url: https://{account-domain}.aha.io/api/v1
  description: Aha! API Server
  variables:
    account-domain:
      description: Your Aha! account domain
      default: company
security:
- OAuth2: []
- ApiKeyAuth: []
- CookieAuth: []
tags:
- name: Users
paths:
  /api/v1/products/{product_id}/users:
    post:
      summary: Create a user
      description: null
      tags:
      - Users
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
        description: ProductId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/UsersPostResponse'
              example:
                role: 20
                role_description: Owner
                user:
                  id: '6776881149496250378'
                  name: sam doe
                  email: sam.doe@example.com
                  created_at: '2019-01-01T00:00:00.000Z'
                  updated_at: '2019-01-01T00:00:00.000Z'
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsersPostRequest'
            example:
              user:
                email: sam.doe@example.com
                first_name: sam
                last_name: doe
                role: product_owner
    get:
      summary: List users associated with a product
      description: null
      tags:
      - Users
