                  total_records: 2
                  total_pages: 1
                  current_page: 1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
  /api/v1/strategy_positions/{id}:
    get:
      summary: Get a specific strategic positioning
      description: null
      tags:
      - Strategic positionings
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/StrategicpositioningsGetResponse'
              example:
                strategy_positioning:
                  id: '453528824'
                  name: Aha! strategic positioning model canvas
                  kind: Positioning
