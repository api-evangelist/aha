                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                example:
                  id: 37485938
                  name: Growth opportunity
                  description: ''
              example:
              - id: 37485938
                name: Growth opportunity
                description: ''
            url:
              type: string
              example: http://company.aha.io/business_models/453528824
            resource:
              type: string
              example: http://company.aha.io/business_models/453528824
            project:
              type: object
              properties:
                id:
                  type: string
                  example: '517761884'
                reference_prefix:
                  type: string
                  example: PRJ2
                name:
                  type: string
                  example: Project 2
                product_line:
