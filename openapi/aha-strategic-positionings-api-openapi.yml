    StrategicpositioningsGetResponse:
      type: object
      properties:
        strategy_positioning:
          type: object
          properties:
            id:
              type: string
              example: '453528824'
            name:
              type: string
              example: Aha! strategic positioning model canvas
            kind:
              type: string
              example: Positioning
            components:
              type: array
              items:
