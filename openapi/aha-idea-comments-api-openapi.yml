                $ref: '#/components/schemas/IdeacommentsPostResponse'
              example:
                idea_comment:
                  id: '6776881149497092049'
                  idea_id: '58056975'
                  body: <p>This is the comment body.</p>
                  created_at: '2019-01-01T00:00:00.000Z'
