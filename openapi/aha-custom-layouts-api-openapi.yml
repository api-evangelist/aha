                    api_type: string
                    required: false
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
  /api/v1/screen_definitions/{id}:
    get:
      summary: Get a custom layout by ID
      description: 'Custom layouts in Aha! Roadmaps help you define the information that you want your teammates to see at two important times: when they create a record and when they view a record''s details. You must be a configuration administrator to view custom layouts on your account through the API.


        For more information about custom layouts, consult our support documentation: https://www.aha.io/support/roadmaps/strategic-roadmaps/customizations/custom-layouts'
      tags:
      - Custom Layouts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CustomLayoutsGetResponse'
              example:
                id: 19837977
                screenable_type: Feature
                name: Screen Definition 6
                custom_field_definitions:
                - id: 839883647
                  key: custom_scorecard_definition
                  position: 3
                  name: Some custom scorecard definition
                  type: CustomFieldDefinitions::ScorecardField
                  api_type: scorecard
                  required: false
                - id: 182007396
                  key: custom_table
                  position: 7
                  name: Custom Table
                  type: CustomFieldDefinitions::LinkMasterDetail
                  api_type: array
                  required: false
                - id: 20549131
                  key: customer
                  position: 2
                  name: Customer
                  type: CustomFieldDefinitions::SelectEditable
                  api_type: string
                  configuration_display: null
                  required: false
                  options:
                  - id: 106870231
                    label: cust1
                  - id: 525853807
                    label: cust2
                  - id: 676386040
                    label: cust3
                - id: 141558949
                  key: customers_table
                  position: 1
                  name: Customers for custom table
                  type: CustomFieldDefinitions::LinkMany
                  api_type: array
                  required: false
                - id: 384804762
                  key: product_managers
                  position: 7
                  name: Product Managers
                  type: CustomFieldDefinitions::Records::UsersField
                  api_type: array
                  required: false
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
components:
  schemas:
    CustomLayoutsGetResponse:
      type: object
      properties:
        id:
          type: integer
          example: 19837977
        screenable_type:
          type: string
          example: Feature
        name:
          type: string
          example: Screen Definition 6
        custom_field_definitions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 839883647
              key:
                type: string
                example: custom_scorecard_definition
              position:
                type: integer
                example: 3
              name:
                type: string
                example: Some custom scorecard definition
              type:
                type: string
                example: CustomFieldDefinitions::ScorecardField
              api_type:
                type: string
                example: scorecard
              required:
                type: boolean
                example: false
            example:
              id: 839883647
              key: custom_scorecard_definition
              position: 3
              name: Some custom scorecard definition
              type: CustomFieldDefinitions::ScorecardField
              api_type: scorecard
              required: false
          example:
          - id: 839883647
            key: custom_scorecard_definition
            position: 3
            name: Some custom scorecard definition
            type: CustomFieldDefinitions::ScorecardField
            api_type: scorecard
            required: false
          - id: 182007396
            key: custom_table
            position: 7
            name: Custom Table
            type: CustomFieldDefinitions::LinkMasterDetail
            api_type: array
            required: false
          - id: 20549131
            key: customer
