openapi: 3.1.0
info:
  title: Aha! Account backups Custom Layouts API
  version: 1.0.0
  description: Complete API documentation for Aha! generated from actual test responses
  contact:
    name: Aha! Support
    url: https://www.aha.io/support
servers:
- url: https://{account-domain}.aha.io/api/v1
  description: Aha! API Server
  variables:
    account-domain:
      description: Your Aha! account domain
      default: company
security:
- OAuth2: []
- ApiKeyAuth: []
- CookieAuth: []
tags:
- name: Custom Layouts
paths:
  /api/v1/screen_definitions:
    get:
      summary: List all custom layouts
      description: 'Custom layouts in Aha! Roadmaps help you define the information that you want your teammates to see at two important times: when they create a record and when they view a record''s details. You must be a configuration administrator to view custom layouts on your account through the API.


        For more information about custom layouts, consult our support documentation: https://www.aha.io/support/roadmaps/strategic-roadmaps/customizations/custom-layouts'
      tags:
      - Custom Layouts
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: string
        example: '1'
      - name: per_page
        in: query
        required: false
        schema:
          type: string
        example: '50'
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CustomLayoutsGetResponse'
              example:
                screen_definitions:
                - id: 19837977
                  screenable_type: Feature
                  name: Screen Definition 6
                  custom_field_definitions:
                  - id: 839883647
                    key: custom_scorecard_definition
                    position: 3
                    name: Some custom scorecard definition
                    type: CustomFieldDefinitions::ScorecardField
                    api_type: scorecard
                    required: false
                  - id: 182007396
                    key: custom_table
                    position: 7
                    name: Custom Table
                    type: CustomFieldDefinitions::LinkMasterDetail
                    api_type: array
                    required: false
                  - id: 20549131
                    key: customer
                    position: 2
                    name: Customer
                    type: CustomFieldDefinitions::SelectEditable
                    api_type: string
                    configuration_display: null
                    required: false
                    options:
                    - id: 106870231
                      label: cust1
                    - id: 525853807
                      label: cust2
                    - id: 676386040
                      label: cust3
                  - id: 141558949
                    key: customers_table
                    position: 1
                    name: Customers for custom table
                    type: CustomFieldDefinitions::LinkMany
                    api_type: array
                    required: false
                  - id: 384804762
                    key: product_managers
                    position: 7
                    name: Product Managers
                    type: CustomFieldDefinitions::Records::UsersField
                    api_type: array
                    required: false
                - id: 26499634
                  screenable_type: Page
                  name: Screen Definition 7
                  custom_field_definitions:
                  - id: 529933329
                    key: review_date
                    position: 1
                    name: Review date
                    type: CustomFieldDefinitions::DateField
                    api_type: date
                    required: false
                - id: 105082880
                  screenable_type: Project
                  name: Screen Definition 2
                  custom_field_definitions: []
                - id: 117022249
                  screenable_type: StrategicImperative
                  name: Screen Definition 13
                  custom_field_definitions: []
                - id: 202819082
                  screenable_type: Feature
                  name: Screen Definition Feature 2
                  custom_field_definitions: []
                - id: 405267877
                  screenable_type: Ideas::Idea
                  name: Screen Definition 5
                  custom_field_definitions:
                  - id: 711072024
                    key: customers_table
                    position: 1
                    name: Customers for custom table
                    type: CustomFieldDefinitions::LinkMany
                    api_type: array
                    required: false
                - id: 412945294
                  screenable_type: null
                  name: Screen Definition 14 - Idea with attachment custom field
                  custom_field_definitions: []
                - id: 475481209
                  screenable_type: Task
                  name: Approvals custom layout
                  custom_field_definitions: []
                - id: 524951996
                  screenable_type: Project
                  name: Screen Definition 1
                  custom_field_definitions:
                  - id: 807801664
                    key: name
                    position: 1
                    name: Name
                    type: CustomFieldDefinitions::TextField
                    api_type: string
                    required: false
                  - id: 221120583
                    key: website
                    position: 2
                    name: Website
                    type: CustomFieldDefinitions::UrlField
                    api_type: url
                    required: false
                - id: 647403809
                  screenable_type: Release
                  name: Screen Definition 8
                  custom_field_definitions:
                  - id: 3228193
                    key: release_custom_date
                    position: 1
                    name: Release custom date
                    type: CustomFieldDefinitions::DateField
                    api_type: date
                    required: false
                - id: 687341318
                  screenable_type: Requirement
                  name: Screen Definition 11
                  custom_field_definitions:
                  - id: 85990596
                    key: priority
                    position: 3
                    name: Priority
