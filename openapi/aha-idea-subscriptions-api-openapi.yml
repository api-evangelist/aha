openapi: 3.1.0
info:
  title: Aha! Account backups Idea subscriptions API
  version: 1.0.0
  description: Complete API documentation for Aha! generated from actual test responses
  contact:
    name: Aha! Support
    url: https://www.aha.io/support
servers:
- url: https://{account-domain}.aha.io/api/v1
  description: Aha! API Server
  variables:
    account-domain:
      description: Your Aha! account domain
      default: company
security:
- OAuth2: []
- ApiKeyAuth: []
- CookieAuth: []
tags:
- name: Idea subscriptions
paths:
  /api/v1/ideas/{idea_id}/subscriptions:
    post:
      summary: Create an idea subscription
      description: null
      tags:
      - Idea subscriptions
      parameters:
      - name: idea_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IdeasubscriptionsPostResponse'
              example:
                idea_subscription:
                  id: '6776881149499782711'
                  idea_id: '58056975'
                  created_at: '2019-01-01T00:00:00.000Z'
                  portal_user:
                    id: '6776881149490241023'
                    name: username@example.com
                    email: username@example.com
                    created_at: '2019-01-01T00:00:00.000Z'
                  idea:
                    id: '58056975'
                    reference_num: PRJ1-I-1
                    name: Idea 1
                    created_at: '2019-01-01T00:00:00.000Z'
                    updated_at: '2019-01-01T00:00:00.000Z'
                    workflow_status:
                      id: '3259216'
                      name: New
                      position: 1
                      complete: false
                      color: '#dce7c6'
                    description:
                      id: '103757394'
                      body: Description of idea 1
                      editor_version: 1
                      created_at: '2019-01-01T00:00:00.000Z'
                      updated_at: '2019-01-01T00:00:00.000Z'
                      attachments: []
                    url: http://company.aha.io/ideas/ideas/PRJ1-I-1
                    resource: http://company.aha.io/api/v1/ideas/PRJ1-I-1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdeasubscriptionsPostRequest'
            example:
              idea_subscription:
                email: username@example.com
    get:
      summary: List subscriptions for an idea
      description: null
      tags:
      - Idea subscriptions
      parameters:
      - name: idea_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IdeasubscriptionsGetResponse'
              example:
                idea_subscriptions:
                - id: '783147498'
                  idea_id: '58056975'
                  created_at: '2019-01-01T00:00:00.000Z'
                  portal_user:
                    id: '646391926'
                    name: John Long
                    email: john@long.com
                    created_at: '2019-01-01T00:00:00.000Z'
                pagination:
                  total_records: 1
                  total_pages: 1
                  current_page: 1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
  /api/v1/ideas/{idea_id}/subscriptions/{id}:
    get:
      summary: Get a specific subscription for an idea
      description: null
      tags:
      - Idea subscriptions
      parameters:
      - name: idea_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaId identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
