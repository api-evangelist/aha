                  idea_id: '58056975'
                  created_at: '2019-01-01T00:00:00.000Z'
                  portal_user:
                    id: '646391926'
                    name: John Long
                    email: john@long.com
                    created_at: '2019-01-01T00:00:00.000Z'
                  idea:
                    id: '58056975'
                    reference_num: PRJ1-I-1
                    name: Idea 1
                    created_at: '2019-01-01T00:00:00.000Z'
                    updated_at: '2019-01-01T00:00:00.000Z'
                    workflow_status:
                      id: '3259216'
                      name: New
                      position: 1
                      complete: false
                      color: '#dce7c6'
                    description:
                      id: '103757394'
                      body: Description of idea 1
                      editor_version: 1
                      created_at: '2019-01-01T00:00:00.000Z'
                      updated_at: '2019-01-01T00:00:00.000Z'
                      attachments: []
                    url: http://company.aha.io/ideas/ideas/PRJ1-I-1
                    resource: http://company.aha.io/api/v1/ideas/PRJ1-I-1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
    delete:
      summary: Delete an idea subscription
      description: null
      tags:
      - Idea subscriptions
      parameters:
      - name: idea_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaId identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '204':
          description: No content - operation successful
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
