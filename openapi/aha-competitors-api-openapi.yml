openapi: 3.1.0
info:
  title: Aha! Account backups Competitors API
  version: 1.0.0
  description: Complete API documentation for Aha! generated from actual test responses
  contact:
    name: Aha! Support
    url: https://www.aha.io/support
servers:
- url: https://{account-domain}.aha.io/api/v1
  description: Aha! API Server
  variables:
    account-domain:
      description: Your Aha! account domain
      default: company
security:
- OAuth2: []
- ApiKeyAuth: []
- CookieAuth: []
tags:
- name: Competitors
paths:
  /api/v1/products/{product_id}/competitors:
    get:
      summary: List competitors in a product
      description: null
      tags:
      - Competitors
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
        description: ProductId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CompetitorsGetResponse'
              example:
                competitors:
                - id: '457085224'
                  name: TrackFast
                  created_at: '2019-01-01T00:00:00.000Z'
                - id: '741974453'
                  name: Road Racer
                  created_at: '2019-01-01T00:00:00.000Z'
                - id: '892399625'
                  name: 360 Tracker
                  created_at: '2019-01-01T00:00:00.000Z'
                pagination:
                  total_records: 3
                  total_pages: 1
                  current_page: 1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
    post:
      summary: Create a competitor
      description: null
      tags:
      - Competitors
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
        description: ProductId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CompetitorsPostResponse'
              example:
                competitor:
                  id: '6776881149490638099'
                  name: Plan-a-lot
                  color: 29647
                  subtitle: null
                  created_at: '2019-01-01T00:00:00.000Z'
                  updated_at: '2019-01-01T00:00:00.000Z'
                  url: http://company.aha.io/competitors/PRJ1-C-1
                  resource: http://company.aha.io/competitors/PRJ1-C-1
                  custom_fields: []
                  comments_count: 0
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorsPostRequest'
            example:
              competitor:
                name: Plan-a-lot
                color: 29647
  /api/v1/competitors/{id}:
    get:
      summary: Get a specific competitor
      description: null
      tags:
      - Competitors
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CompetitorsGetResponse'
              example:
                competitor:
                  id: '892399625'
                  name: 360 Tracker
                  color: 29647
                  subtitle: null
                  created_at: '2019-01-01T00:00:00.000Z'
                  updated_at: '2019-01-01T00:00:00.000Z'
                  url: http://company.aha.io/competitors/PROD-C-1
                  resource: http://company.aha.io/competitors/PROD-C-1
                  custom_fields:
                  - id: 415795050
                    key: revenue
                    name: Revenue
                    updatedAt: '2019-01-01T00:00:00Z'
                    value: '300.0'
                    type: number
                  comments_count: 1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
  /api/v1/products/{product_id}/competitors/{id}:
    put:
      summary: Update a competitor
      description: null
      tags:
      - Competitors
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
        description: ProductId identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CompetitorsPutResponse'
              example:
                competitor:
                  id: '892399625'
                  name: Plan-a-lot
                  color: 29647
                  subtitle: null
                  created_at: '2019-01-01T00:00:00.000Z'
                  updated_at: '2019-01-01T00:00:00.000Z'
                  url: http://company.aha.io/competitors/PROD-C-1
                  resource: http://company.aha.io/competitors/PROD-C-1
                  custom_fields:
                  - id: 415795050
                    key: revenue
                    name: Revenue
                    updatedAt: '2019-01-01T00:00:00Z'
                    value: '300.0'
                    type: number
                  comments_count: 1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorsPostRequest'
            example:
              competitor:
                name: Plan-a-lot
    delete:
      summary: Delete a competitor
      description: null
      tags:
      - Competitors
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: string
        description: ProductId identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Id identifier
      responses:
        '204':
          description: No content - operation successful
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
