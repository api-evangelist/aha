openapi: 3.1.0
info:
  title: Aha! Account backups Integration fields API
  version: 1.0.0
  description: Complete API documentation for Aha! generated from actual test responses
  contact:
    name: Aha! Support
    url: https://www.aha.io/support
servers:
- url: https://{account-domain}.aha.io/api/v1
  description: Aha! API Server
  variables:
    account-domain:
      description: Your Aha! account domain
      default: company
security:
- OAuth2: []
- ApiKeyAuth: []
- CookieAuth: []
tags:
- name: Integration fields
paths:
  /api/v1/features/{feature_id}/integrations/{integration_id}/fields:
    post:
      summary: Create an integration field for a feature by integration ID
      description: null
      tags:
      - Integration fields
      parameters:
      - name: feature_id
        in: path
        required: true
        schema:
          type: string
        description: FeatureId identifier
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsPostResponseArrayInteger'
              example:
              - 728894778
              - 846945422
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationfieldsPostRequest'
            example:
              integration_field:
                name: key
                value: JRA-34
  /api/v1/features/{feature_id}/integrations/{service_name}/fields:
    post:
      summary: Create an integration field for a feature by service name
      description: 'DEPRECATED: provide :integration_id rather than :service_name to identify the integration.'
      tags:
      - Integration fields
      parameters:
      - name: feature_id
        in: path
        required: true
        schema:
          type: string
        description: FeatureId identifier
      - name: service_name
        in: path
        required: true
        schema:
          type: string
        description: ServiceName identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsPostResponseArrayInteger'
              example:
              - 728894778
              - 846945422
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationfieldsPostRequest'
            example:
              integration_field:
                name: key
                value: JRA-34
  /api/v1/epics/{epic_id}/integrations/{integration_id}/fields:
    post:
      summary: Create an integration field for a epic by integration ID
      description: null
      tags:
      - Integration fields
      parameters:
      - name: epic_id
        in: path
        required: true
        schema:
          type: string
        description: EpicId identifier
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsPostResponseArrayInteger'
              example:
              - 907392375
              - 790422735
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationfieldsPostRequest'
            example:
              integration_field:
                name: key
                value: JRA-34
  /api/v1/idea_endorsements/{idea_endorsement_id}/integrations/{integration_id}/fields:
    post:
      summary: Create an integration field for an idea vote
      description: null
      tags:
      - Integration fields
      parameters:
      - name: idea_endorsement_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaEndorsementId identifier
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsPostResponse'
              example:
                integration_field:
                  id: '975466318'
                  name: key
                  value: JRA-34
                  integration_id: 204584239
                  service_name: jira
                  created_at: '2019-01-01T00:00:00.000Z'
                  integratable:
                    url: http://company.aha.io/ideas/idea_endorsements/53377392
                    resource: http://company.aha.io/api/v1/ideas/idea_endorsements/53377392
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationfieldsPostRequest'
            example:
              integration_field:
                name: key
                value: JRA-34
  /api/v1/ideas/{idea_id}/integrations/{integration_id}/fields:
    post:
      summary: Create an integration field for an idea by integration ID
      description: null
      tags:
      - Integration fields
      parameters:
      - name: idea_id
        in: path
        required: true
        schema:
          type: string
        description: IdeaId identifier
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsPostResponseArrayString'
              example:
              - '6776881149484343025'
              - '6776881149496067156'
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationfieldsPostRequest'
            example:
              integration_field:
                name: key
                value: JRA-34
  /api/v1/features/{feature_id}/integrations/{integration_id}/fields/{field_name}:
    get:
      summary: Get a specific integration field value
      description: null
      tags:
      - Integration fields
      parameters:
      - name: feature_id
        in: path
        required: true
        schema:
          type: string
        description: FeatureId identifier
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      - name: field_name
        in: path
        required: true
        schema:
          type: string
        description: FieldName identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/IntegrationfieldsGetResponse'
              example:
                integration_field:
                  id: '728894778'
                  name: key
                  value: JRA-123
                  integration_id: 204584239
                  service_name: jira
                  created_at: '2019-01-01T00:00:00.000Z'
                  integratable:
                    url: http://company.aha.io/features/PRJ1-1
                    resource: http://company.aha.io/api/v1/features/PRJ1-1
      security:
      - OAuth2: []
      - ApiKeyAuth: []
      - CookieAuth: []
  /api/v1/integrations/{integration_id}/fields/{field_name}/value/{field_value}:
    get:
      summary: List records with an associated integration field value
      description: Possible records are releases, initiatives, features, epics, requirements, ideas or idea votes.
      tags:
      - Integration fields
      parameters:
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
        description: IntegrationId identifier
      - name: field_name
        in: path
        required: true
        schema:
          type: string
        description: FieldName identifier
      - name: field_value
        in: path
        required: true
        schema:
          type: string
        description: FieldValue identifier
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
