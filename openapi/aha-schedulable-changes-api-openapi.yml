        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulablechangesPostRequest'
            example:
              schedulable_change:
                effective_start_date: '2019-01-01'
                schedule_id: 54870801
                team_member_count: 4
                hourly_rate: 155.0
              team_id: 949295028
