      summary: Create a schedulable change
      description: null
      tags:
      - Schedulable changes
      parameters: []
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              description: application/json; charset=utf-8
              schema:
                type: string
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/SchedulablechangesPostResponse'
              example:
                schedulable_change:
                  id: '6776881149488722242'
                  effective_start_date: '2019-01-01'
                  team_members_count: 5
                  hourly_rate: '155.0'
                  color: 6710886
                  schedule:
                    id: '54870801'
                    name: Another schedule
                    hours_per_day: '10.0'
                    story_points_per_day: '5.0'
                    velocity: '10.0'
                  team_memberships:
                  - id: '202266373'
                    name: John Johnson
                    new_user: false
                    deleted: null
                    schedule:
                      id: '441193141'
                      name: Default schedule
                      hours_per_day: '8.2'
                      story_points_per_day: '1.0'
                      velocity: '10.5'
                      monday: true
                      tuesday: true
                      wednesday: true
                      thursday: true
