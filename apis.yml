aid: aha
name: Aha.io
description: >-
  Aha! is a product development suite that combines roadmapping, idea
  management, requirements specification, whiteboarding, knowledge bases, and
  development tracking into a single platform for product teams. The suite
  spans Aha! Roadmaps, Aha! Ideas, Aha! Whiteboards, Aha! Knowledge, and
  Aha! Develop with integrations into engineering tools like Jira and GitHub.
  The Aha! REST API offers full CRUD access to products, releases, features,
  ideas, and integrations with OAuth 2.0, API key, and Basic authentication
  options.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Product Management
  - Roadmapping
  - Idea Management
  - Product Development
  - Requirements
  - Agile
