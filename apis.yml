apis:
  - aid: aha:rest-api
    name: Aha.io REST API
    description: >-
      REST API for managing products, releases, features, ideas, goals,
      initiatives, and integrations across Aha! Roadmaps, Ideas, and Develop.
      Supports OAuth 2.0, API key Bearer tokens, and deprecated Basic auth,
      with 300 requests per minute and 20 per second rate limits.
    humanURL: https://www.aha.io/api
    baseURL: https://{subdomain}.aha.io/api/v1
